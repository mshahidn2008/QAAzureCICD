name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Find playwright config
      run: |
        echo "=== Searching for playwright config ==="
        find . -name "playwright*.config.ts" -type f
        echo "=== Repo root structure ==="
        ls -la
        ls -la tests/ 2>/dev/null || echo "tests/ directory not found"
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: tests/
      run: npm ci
    
    - name: Run Playwright tests
      env:
        PLAYWRIGHT_SERVICE_URL: ${{ secrets.PLAYWRIGHT_SERVICE_URL }}
        PLAYWRIGHT_SERVICE_ACCESS_TOKEN: ${{ secrets.PLAYWRIGHT_SERVICE_ACCESS_TOKEN }}
      run: |
        cd tests/
        npx playwright test -c playwright.service.config.ts --workers=1
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-tests-report
        path: playwright-report/
        retention-days: 30

