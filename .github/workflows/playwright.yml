name: Playwright Tests

on:
  push:
    branches: [ main ]

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: tests/
      run: npm ci
    
    - name: Install Playwright browsers with dependencies
      run: npx playwright install --with-deps
    
    - name: Run Playwright tests
      id: playwright
      working-directory: tests/
      continue-on-error: true
      run: |
        npx playwright test --workers=1 --reporter=json,html
        echo "exit_code=$?" >> $GITHUB_OUTPUT
    
    - name: Generate Playwright Test Summary
      if: always()
      working-directory: tests/
      run: |
        echo "## 📊 Playwright Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "test-results.json" ]; then
          echo "### Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          TOTAL_TESTS=$(jq '.stats.expected' test-results.json 2>/dev/null || echo "N/A")
          PASSED=$(jq '.stats.passed' test-results.json 2>/dev/null || echo "N/A")
          FAILED=$(jq '.stats.failed' test-results.json 2>/dev/null || echo "N/A")
          SKIPPED=$(jq '.stats.skipped' test-results.json 2>/dev/null || echo "N/A")
          DURATION=$(jq '.stats.duration' test-results.json 2>/dev/null || echo "N/A")
          
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Total Tests** | $TOTAL_TESTS |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ **Passed** | $PASSED |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ **Failed** | $FAILED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ **Skipped** | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏱️ **Duration** | $DURATION ms |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$TOTAL_TESTS" != "N/A" ] && [ "$TOTAL_TESTS" != "0" ]; then
            PASS_RATE=$(echo "scale=2; ($PASSED / $TOTAL_TESTS) * 100" | bc)
            echo "**Pass Rate:** ${PASS_RATE}%" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "$FAILED" != "N/A" ] && [ "$FAILED" -gt 0 ]; then
            echo "### ❌ Failed Tests" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Test | Error |" >> $GITHUB_STEP_SUMMARY
            echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
            jq -r '.suites[].specs[] | select(.tests[].results[].status == "failed") | "| \(.title) | \(.tests[].results[].error?.message // "Unknown error" | split("\n")[0] | sub("\\|"; "\\\\|")) |"' test-results.json 2>/dev/null >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "⚠️ No test results JSON file found" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "### 📎 Detailed Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Download the Playwright HTML report from the artifacts section below for detailed test results." >> $GITHUB_STEP_SUMMARY
    
    - name: Upload Playwright report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-tests-report
        path: tests/playwright-report/
        retention-days: 30
    
    - name: Upload test results JSON
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-test-results
        path: tests/test-results.json
        retention-days: 7
    
    - name: Fail job if tests failed
      if: steps.playwright.outputs.exit_code != 0
      run: exit ${{ steps.playwright.outputs.exit_code }}
