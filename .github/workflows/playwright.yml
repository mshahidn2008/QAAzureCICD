trigger:
  branches:
    include:
    - main
pool:
  vmImage: "ubuntu-latest"
stages:
- stage: __default
  jobs:
  - job: PlaywrightTests
    displayName: "Playwright Tests"
    steps:
    - task: PowerShell@2
      displayName: "Find playwright config"
      inputs:
        targetType: "inline"
        script: |
          Write-Host "=== Searching for playwright config ==="
          Get-ChildItem -Path $(System.DefaultWorkingDirectory) -Recurse -Filter "playwright*.config.ts" -ErrorAction SilentlyContinue
          Write-Host "=== Repo root structure ==="
          Get-ChildItem -Path $(System.DefaultWorkingDirectory) -Depth 2
    - task: PowerShell@2
      displayName: "Install dependencies"
      inputs:
        targetType: "inline"
        script: "npm ci"
        workingDirectory: tests/
    - task: AzureCLI@2
      displayName: "Run Playwright Test"
      env:
        PLAYWRIGHT_SERVICE_URL: $(PLAYWRIGHT_SERVICE_URL)
        PLAYWRIGHT_SERVICE_ACCESS_TOKEN: $(PLAYWRIGHT_SERVICE_ACCESS_TOKEN)
      inputs:
        azureSubscription: "PlayWrightTest1"
        scriptType: "pscore"
        scriptLocation: "inlineScript"
        addSpnToEnvironment: true
        inlineScript: "npx playwright test -c playwright.service.config.ts --workers=1"
    - task: PublishPipelineArtifact@1
      displayName: "Upload Playwright report"
      condition: always()
      inputs:
        targetPath: playwright-report/
        artifact: "Playwright tests"
        publishLocation: "pipeline"
